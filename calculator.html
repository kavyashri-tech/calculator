<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    
    <div class = "container">
        <div class="display"><input type="text" id="display"></div>
        <button class="box1 box" onclick="clearDisplay()">C</button>
        <button class="box2 box" onclick="appendValue('/')">/</button>
        <button class="box3 box" onclick="appendValue('*')">*</button>
        <button class="box4 box" onclick="deleteLast()"><i class="fa-solid fa-delete-left"></i></button>
        <button class="box5 box"onclick="appendValue('7')">7</button>
        <button class="box6 box" onclick="appendValue('8')">8</button>
        <button class="box7 box" onclick="appendValue('9')">9</button>
        <button class="box8 box"onclick="appendValue('-')">-</button>
        <button class="box9 box" onclick="appendValue('4')">4</button>
        <button class="box10 box" onclick="appendValue('5')">5</button>
        <button class="box11 box" onclick="appendValue('6')">6</button>
        <button class="box12 box" onclick="appendValue('+')">+</button>
        <button class="box13 box" onclick="appendValue('1')">1</button>
        <button class="box14 box" onclick="appendValue('2')">2</button>
        <button class="box15 box" onclick="appendValue('3')">3</button>
        <button class="box16 box" onclick="appendValue('%')">%</button>
        <button class="box17 box" onclick="appendValue('0')">0</button>
        <button class="box18 box" onclick="appendValue('.')">.</button>
        <button class="box19 box" onclick="calculate('=')">=</button>

        

    </div>
    <script src="calculator.js"></script>
</body>
</html>
